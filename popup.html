<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Scolia Color Changer</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
<div class="header">
  <div class="logo" id="headerLogo"><img src="scolia_logo_weiß128.png" alt="Scolia"></div>
  <div class="header-text">
    <h1>Scolia Color Changer</h1>
    <p>Akzentfarbe individuell anpassen</p>
  </div>
</div>

<div class="content">
  <div class="color-preview">
    <div class="preview-swatch" id="previewBox"></div>
    <div class="preview-info">
      <div class="label">Gewählte Farbe</div>
      <div class="hex-value" id="hexDisplay">#5AAB30</div>
      <div class="color-name" id="colorName">Original Grün</div>
    </div>
  </div>

  <div class="section-label">Voreinstellungen</div>
  <div class="presets" id="presets"></div>

  <div class="divider"></div>

  <div class="section-label">Eigene Farbe</div>
  <div class="color-input-row">
    <div class="color-picker-wrap">
      <div class="color-picker-swatch" id="pickerSwatch">🎨</div>
      <input type="color" id="colorPicker" value="#5AAB30">
    </div>
    <input type="text" id="hexInput" value="#5AAB30" maxlength="7" placeholder="#RRGGBB">
  </div>

  <button class="btn-apply" id="btnApply">✓ &nbsp;Farbe anwenden</button>
  <div class="btn-row">
    <button class="btn-reload" id="btnReload">↺ &nbsp;Neu laden & anwenden</button>
    <button class="btn-reset" id="btnReset">↩ &nbsp;Original-Grün</button>
  </div>

  <div class="tip">
    <strong>Tipp:</strong> Falls die Farbe sich nicht ändert, nutze <em>"Neu laden & anwenden"</em> — das startet Scolia frisch mit der neuen Farbe.
  </div>

  <div class="status" id="status"></div>
</div>
<script src="popup.js"></script>

<div class="footer">
  Made by <strong>Lukas9627</strong><span>·</span>Scolia Color Changer
</div>
</body>
</html>
